name: Release

on:
  push:
    branches: [ "master" ]

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version_name: ${{ steps.check.outputs.version_name }}
      version_code: ${{ steps.check.outputs.version_code }}
      release_exists: ${{ steps.check.outputs.release_exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV=$(git show HEAD^:gradle.properties 2>/dev/null || echo "")
          CURR=$(cat gradle.properties)

          extract() { echo "$1" | grep "^$2=" | cut -d= -f2; }

          PREV_NAME=$(extract "$PREV" "app.versionName")
          CURR_NAME=$(extract "$CURR" "app.versionName")
          PREV_CODE=$(extract "$PREV" "app.versionCode")
          CURR_CODE=$(extract "$CURR" "app.versionCode")

          if [ "$PREV_NAME" != "$CURR_NAME" ] || [ "$PREV_CODE" != "$CURR_CODE" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version_name=$CURR_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$CURR_CODE" >> "$GITHUB_OUTPUT"

          if gh release view "v${CURR_NAME}" &>/dev/null; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true' || needs.check-version.outputs.release_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --ignore-garbage --decode > app/ifood.jks

      - name: Create local.properties
        run: |
          echo "signing.keystore.path=./ifood.jks" >> local.properties
          echo "signing.keystore.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> local.properties
          echo "signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }}" >> local.properties
          echo "signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> local.properties

      - name: Build release APK
        run: ./gradlew assembleRelease -Psigning.enabled=true

      - name: Build release AAB
        run: ./gradlew bundleRelease -Psigning.enabled=true

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s" | head -30)
          else
            LOG=$(git log --pretty=format:"- %s" | head -30)
          fi
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ needs.check-version.outputs.version_name }}
          VERSION_CODE: ${{ needs.check-version.outputs.version_code }}
        run: |
          gh release create "v${VERSION_NAME}" \
            --title "v${VERSION_NAME} (build ${VERSION_CODE})" \
            --notes "## What's new

          ${{ steps.changelog.outputs.log }}" \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/bundle/release/app-release.aab
