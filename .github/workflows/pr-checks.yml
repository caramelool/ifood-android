name: PR Checks

on:
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    strategy:
      matrix:
        build_type: [debug, release]
        include:
          - build_type: debug
            build_type_cap: Debug
          - build_type: release
            build_type_cap: Release

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (${{ matrix.build_type }})
        run: ./gradlew assemble${{ matrix.build_type_cap }}

      - name: Run Unit Tests (${{ matrix.build_type }})
        run: ./gradlew test${{ matrix.build_type_cap }}UnitTest

      - name: Generate Coverage Report (${{ matrix.build_type }})
        run: ./gradlew koverXmlReport${{ matrix.build_type_cap }} koverHtmlReport${{ matrix.build_type_cap }}

