name: PR Checks

on:
  pull_request:
    branches: [ "master" ]

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (debug)
        run: ./gradlew assembleDebug

  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (release)
        run: ./gradlew assembleRelease

  unit-test:
    runs-on: ubuntu-latest
    needs: build-debug
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-debug
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

  coverage:
    runs-on: ubuntu-latest
    needs: unit-test
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Coverage Report
        run: ./gradlew koverXmlReportDebug koverHtmlReportDebug

      - name: Verify Coverage Threshold
        id: verify_coverage
        run: ./gradlew koverVerifyDebug

      - name: Parse Coverage Data
        if: always()
        id: coverage
        run: python3 .github/scripts/parse_coverage.py app/build/reports/kover

      - name: Comment Coverage on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERIFY_OUTCOME: ${{ steps.verify_coverage.outcome }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          AVAILABLE: ${{ steps.coverage.outputs.available }}
          LINE_PCT: ${{ steps.coverage.outputs.line_pct }}
          LINE_COVERED: ${{ steps.coverage.outputs.line_covered }}
          LINE_TOTAL: ${{ steps.coverage.outputs.line_total }}
          BRANCH_PCT: ${{ steps.coverage.outputs.branch_pct }}
          BRANCH_COVERED: ${{ steps.coverage.outputs.branch_covered }}
          BRANCH_TOTAL: ${{ steps.coverage.outputs.branch_total }}
          INSTR_PCT: ${{ steps.coverage.outputs.instruction_pct }}
          INSTR_COVERED: ${{ steps.coverage.outputs.instruction_covered }}
          INSTR_TOTAL: ${{ steps.coverage.outputs.instruction_total }}
        run: |
          MARKER="<!-- coverage-report-bot -->"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          if [ "$VERIFY_OUTCOME" = "success" ]; then
            STATUS_LINE="**Status:** ✅ Todos os thresholds foram atingidos — ótimo trabalho, continue assim!"
          elif [ "$VERIFY_OUTCOME" = "failure" ]; then
            STATUS_LINE="**Status:** ❌ Alguns thresholds não foram atingidos — adicione mais testes e você chegará lá!"
          else
            STATUS_LINE="**Status:** ⚠️ Verificação de threshold não executada."
          fi

          DESCRIPTION="_Este relatório mostra a cobertura de testes do build **Debug** gerada para o commit \`$SHORT_SHA\`._"

          if [ "$AVAILABLE" = "true" ]; then
            BODY=$(printf "%s\n## 📊 Coverage Report — Debug\n\n%s\n\n%s\n\n| Métrica | Coberto | Total | %% |\n|---------|---------|-------|----|\n| Linhas | %s | %s | %s%% |\n| Branches | %s | %s | %s%% |\n| Instruções | %s | %s | %s%% |" \
              "$MARKER" \
              "$DESCRIPTION" \
              "$STATUS_LINE" \
              "$LINE_COVERED" "$LINE_TOTAL" "$LINE_PCT" \
              "$BRANCH_COVERED" "$BRANCH_TOTAL" "$BRANCH_PCT" \
              "$INSTR_COVERED" "$INSTR_TOTAL" "$INSTR_PCT")
          else
            BODY=$(printf "%s\n## 📊 Coverage Report — Debug\n\n%s\n\n**Status:** ⚠️ Dados de cobertura indisponíveis — o build ou a verificação pode ter falhado." \
              "$MARKER" "$DESCRIPTION")
          fi

          REPO="${{ github.repository }}"
          COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$COMMENT_ID" \
              --field body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi

      - name: Upload Coverage Report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-debug
          path: app/build/reports/kover/htmlDebug/
          retention-days: 7
